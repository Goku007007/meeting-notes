services:
  db:
    image: pgvector/pgvector:pg16
    container_name: meeting-notes-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meetingnotes
    ports:
      - "5432:5432"
    volumes:
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: meeting-notes-redis
    ports:
      - "6379:6379"